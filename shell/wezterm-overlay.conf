# wezterm-overlay.conf - Position settings for wezterm-overlay.sh
#
# Copy this file alongside wezterm-overlay.sh and edit as needed:
#   cp shell/wezterm-overlay.conf ~/.claude/hooks/

# Vertical position: top | bottom
OVERLAY_ROW="bottom"

# Horizontal position: right | left
OVERLAY_COL="left"

# Row offset from the edge (bottom: lines up from bottom, top: lines down from top)
OVERLAY_ROW_OFFSET=3
